<!DOCTYPE html><html class="dark" lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Bubble Burst Simulator - Home Gate</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;family=Be+Vietnam+Pro:wght@700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 251, 251, 0.4)); }
            50% { filter: drop-shadow(0 0 20px rgba(0, 251, 251, 0.8)); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
        
        .glass-vessel {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 
                inset 1px 1px 1px rgba(255, 255, 255, 0.2),
                inset -1px -1px 1px rgba(0, 0, 0, 0.4),
                0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .neon-text-glow {
            text-shadow: 0 0 10px rgba(0, 221, 221, 0.6), 0 0 20px rgba(0, 221, 221, 0.3);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Fixed height for Reddit Devvit context */
        .devvit-container {
            height: 512px;
            max-height: 512px;
            position: relative;
            overflow: hidden;
        }

        .caustic-bg {
            background-image: url('https://lh3.googleusercontent.com/aida/AP1WRLvooo8pSiWRT-717mMyHE9f2blXDYHr-F5KmwUR6XrXx5MCoDJF2hpXlC9afCZZVcJZzcK20LRwyG60RzkKFvFkSG-wG1rultitCpREAA34gdhfQqlwUW3nJaEUCyWVyhJpWIgjxgQpOLGFKNdYB4VrSXkYdWlpSACHaK016V1_z9Ul56UkB5ZtSXx121Nvykf4gkXVWEhjwksNn41RSHbKc5J8Lpbbl3z0xghKCJln2NB6yUpZmUKeXTc');
            background-size: cover;
            background-position: center;
        }

        .glow-capsule {
            background: linear-gradient(135deg, #00fbfb 0%, #007070 100%);
            box-shadow: 
                0 0 20px rgba(0, 251, 251, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.6);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .glow-capsule:active {
            transform: scale(0.92);
        }
    </style>

<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-container min-h-screen flex items-center justify-center p-4">
<div class="devvit-container w-full max-w-[800px] bg-background rounded-lg shadow-2xl border border-white/10">
<!-- Ambient Immersive Background -->
<div class="absolute inset-0 caustic-bg z-0 brightness-75">
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-background/20 to-background/90"></div>
</div>
<!-- Top Navigation Bar (Compact) -->
<header class="absolute top-0 w-full z-50 bg-surface-dim/40 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-4 h-14">
<h1 class="font-display-lg-mobile text-[1.25rem] leading-none tracking-tighter text-primary drop-shadow-[0_0_8px_rgba(0,221,221,0.5)]">
        BUBBLE BURST
    </h1>
<div class="flex items-center gap-3">
<div class="flex flex-col items-end mr-2">
<span class="text-[8px] uppercase tracking-widest text-on-surface-variant font-bold">Record</span>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-primary-fixed text-[16px]">military_tech</span>
<span class="text-sm font-bold text-primary">1,240,500</span>
</div>
</div>
<button class="w-8 h-8 rounded-full glass-vessel flex items-center justify-center active:scale-95 transition-all text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">settings</span>
</button>
<div class="w-8 h-8 rounded-full border-2 border-primary-container overflow-hidden shadow-[0_0_10px_rgba(0,251,251,0.3)]">
<div class="w-full h-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface text-[18px]">person</span>
</div>
</div>
</div>
</header>
<!-- Main Content Container -->
<main class="flex flex-col items-center justify-center h-full pt-14 px-4 gap-4 z-10 relative pb-4">
<!-- Compact Center Asset -->
<div class="flex flex-col items-center justify-center w-full animate-float -z-10 mt-2">
<div class="relative w-36 h-36 group rounded-full overflow-hidden">
<img alt="Main Hero Bubble" class="w-full h-full filter drop-shadow-[0_0_30px_rgba(0,251,251,0.4)] transition-transform duration-500 group-hover:scale-110 object-cover" src="https://lh3.googleusercontent.com/aida/AP1WRLt_F9u3vQT_-72CIjsktNEatwh3NDX4vxMP3RHfugo0c7yYMg3_zahTNwQkP8uerv9YlRME6iIu89pq20MldT7Hk9hB2LidQZ_bu49hDkZ__UWeeDxF6MqDktihcizGu9LQC_jb1M9puH0hxuXG6KA6uvHLAnD015iTLmpV7PEw7NGuxToi0Gpph9gcn6NA4ua2zgxcan3HTq5toj6DzNHIQ3GSMsr47cERAi1StfPkm9bK6xdtfeDcpLA">
<div class="absolute inset-0 rounded-full bg-primary-fixed/10 blur-2xl opacity-50 -z-10"></div>
</div>
<div class="text-center mt-4">
<p class="font-label-bold text-[10px] text-primary-fixed tracking-[0.2em] uppercase mb-1">Pop to Power Up</p>
<div class="flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-secondary text-base" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline-md text-lg text-primary">12,450 XP</span>
</div>
</div>
</div>
<!-- Action Area -->
<div class="w-full flex flex-col items-center gap-3">
<div class="flex flex-col gap-3 w-full max-w-[280px]">
<button class="glow-capsule w-full py-3 rounded-full flex items-center justify-center gap-2 group relative overflow-hidden">
<div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
<span class="material-symbols-outlined text-on-primary text-[20px] relative z-10" style="font-variation-settings: 'FILL' 0;">spa</span>
<span class="font-display-lg-mobile text-[20px] text-on-primary relative z-10 font-label-bold tracking-[0.1em]">ZEN MODE</span>
</button>
<button class="glow-capsule w-full py-3 rounded-full flex items-center justify-center gap-2 group relative overflow-hidden">
<div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
<span class="material-symbols-outlined text-on-primary text-[20px] relative z-10" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-display-lg-mobile text-[20px] text-on-primary relative z-10 font-label-bold tracking-[0.1em]">BLITZ MODE</span>
</button>
</div>
</div>
</main>
</div>
<script>
    document.addEventListener('mousemove', (e) => {
        const container = document.querySelector('.devvit-container');
        const rect = container.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;
        
        const hero = document.querySelector('.animate-float');
        if (hero && x >= 0 && x <= 1 && y >= 0 && y <= 1) {
            const moveX = (x - 0.5) * 20;
            const moveY = (y - 0.5) * 20;
            hero.style.transform = `translate(${moveX}px, ${moveY}px)`;
        }
    });

    document.querySelector('button.group')?.addEventListener('mousedown', () => {
        const container = document.querySelector('.devvit-container');
        container.style.backgroundColor = '#1d1f29';
        setTimeout(() => {
            container.style.backgroundColor = '';
        }, 50);
    });
</script>


</body></html>
