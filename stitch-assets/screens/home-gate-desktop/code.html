<script>
        // Micro-interaction: Mouse tracking for subtle background movement
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const hero = document.querySelector('.animate-float');
            if (hero) {
                const moveX = (x - 0.5) * 30;
                const moveY = (y - 0.5) * 30;
                hero.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });

        // Click interaction for satisfying "Pop" sound simulation (Visual only)
        document.querySelector('button.group')?.addEventListener('mousedown', () => {
            document.body.style.backgroundColor = '#1d1f29';
            setTimeout(() => {
                document.body.style.backgroundColor = '';
            }, 50);
        });
    </script>
