<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bubbleFill" cx="50%" cy="50%" r="50%" fx="35%" fy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
      <stop offset="40%" style="stop-color:#2dd4bf;stop-opacity:0.3" />
      <stop offset="80%" style="stop-color:#0f766e;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:0.4" />
    </radialGradient>
    <filter id="gloss" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="45" fill="url(#bubbleFill)" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.5" />
  <ellipse cx="35" cy="35" rx="10" ry="6" fill="#ffffff" fill-opacity="0.8" transform="rotate(-30 35 35)" />
  <circle cx="65" cy="65" r="5" fill="#ffffff" fill-opacity="0.3" />
</svg>