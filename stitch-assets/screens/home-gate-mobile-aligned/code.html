<!-- Bottom Navigation (Compact for Square Post) -->
<script>
    function createPopEffect(e) {
        const container = e.currentTarget;
        const rect = container.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const ripple = document.createElement('div');
        ripple.className = 'absolute rounded-full pointer-events-none bg-primary-fixed/40';
        ripple.style.width = '5px';
        ripple.style.height = '5px';
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.transition = 'all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1)';
        
        container.appendChild(ripple);
        
        requestAnimationFrame(() => {
            ripple.style.width = '150px';
            ripple.style.height = '150px';
            ripple.style.opacity = '0';
        });

        setTimeout(() => ripple.remove(), 500);

        if (window.navigator.vibrate) {
            window.navigator.vibrate(10);
        }
    }
</script>
