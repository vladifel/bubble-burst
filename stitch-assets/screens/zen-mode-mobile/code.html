<style>
        body {
            background-color: #11131c;
            overflow: hidden;
            touch-action: manipulation;
        }

        .glass-vessel {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3), 
                        0 4px 24px rgba(0, 0, 0, 0.4);
        }

        .bubble-glow {
            filter: drop-shadow(0 0 12px rgba(0, 221, 221, 0.4));
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bubble-popped {
            transform: scale(1.5);
            opacity: 0;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .bubble-grid-container {
            perspective: 1000px;
        }

        /* Material Symbols adjustment */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="font-body-md text-on-background h-screen w-full flex flex-col items-center justify-between">
<!-- Background Layer -->
<div class="fixed inset-0 z-0">
<img alt="" class="w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida/AP1WRLvooo8pSiWRT-717mMyHE9f2blXDYHr-F5KmwUR6XrXx5MCoDJF2hpXlC9afCZZVcJZzcK20LRwyG60RzkKFvFkSG-wG1rultitCpREAA34gdhfQqlwUW3nJaEUCyWVyhJpWIgjxgQpOLGFKNdYB4VrSXkYdWlpSACHaK016V1_z9Ul56UkB5ZtSXx121Nvykf4gkXVWEhjwksNn41RSHbKc5J8Lpbbl3z0xghKCJln2NB6yUpZmUKeXTc"/>
<div class="absolute inset-0 bg-gradient-to-b from-surface/20 via-transparent to-surface/80"></div>
</div>
<!-- Top Navigation / HUD -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding py-unit bg-surface/10 backdrop-blur-xl border-b border-white/20 shadow-[inset_0_1px_0_0_rgba(255,255,255,0.3)]">
<div class="flex items-center gap-element-gap">
<span class="text-headline-md font-headline-md font-black text-primary-fixed-dim drop-shadow-[0_0_8px_rgba(0,221,221,0.4)]">
                Zen Mode
            </span>
</div>
<div class="flex items-center gap-4">
<!-- Popped Counter HUD -->
<div class="glass-vessel rounded-full px-4 py-1 flex items-center gap-2">
<span class="material-symbols-outlined text-primary-fixed text-lg" style="font-variation-settings: 'FILL' 1;">bubble_chart</span>
<span class="text-label-bold font-label-bold text-primary-fixed" id="pop-counter">000</span>
</div>
<button class="text-on-surface-variant hover:scale-110 hover:brightness-125 transition-all active:scale-90 duration-100 p-2">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Game Canvas -->
<main class="relative z-10 w-full h-full flex items-center justify-center pt-24 pb-32">
<div class="bubble-grid-container w-full max-w-[400px] px-container-padding">
<!-- 5x5 Grid -->
<div class="grid grid-cols-5 gap-4" id="bubble-grid">
<!-- Generating 25 Bubbles -->
<script>
                    const grid = document.getElementById('bubble-grid');
                    const popCountEl = document.getElementById('pop-counter');
                    let pops = 0;

                    function createBubble() {
                        const bubble = document.createElement('div');
                        bubble.className = 'relative aspect-square cursor-pointer active:scale-95 transition-transform duration-75 animate-float';
                        bubble.style.animationDelay = `${Math.random() * 2}s`;
                        
                        bubble.innerHTML = `
                            <div class="bubble-inner w-full h-full rounded-full border border-white/20 p-1 shadow-[inset_0_4px_12px_rgba(255,255,255,0.4),0_8px_20px_rgba(0,0,0,0.3)] relative overflow-hidden bg-gradient-to-br from-primary-fixed/20 to-transparent">
                                <div class="absolute top-1/4 left-1/4 w-1/3 h-1/4 bg-white/40 rounded-full rotate-[-45deg] blur-[2px]"></div>
                                <div class="absolute bottom-1/4 right-1/4 w-4 h-4 bg-primary-fixed/30 rounded-full blur-[4px]"></div>
                            </div>
                        `;

                        bubble.onclick = (e) => {
                            if (bubble.classList.contains('popped')) return;
                            
                            // Visual Pop
                            bubble.classList.add('popped');
                            const inner = bubble.querySelector('.bubble-inner');
                            inner.style.transform = 'scale(1.8)';
                            inner.style.opacity = '0';
                            inner.style.transition = 'all 0.2s ease-out';
                            
                            // Audio/Haptic feel via visual feedback
                            pops++;
                            popCountEl.textContent = pops.toString().padStart(3, '0');
                            
                            // Respawn logic for "Zen" mode
                            setTimeout(() => {
                                inner.style.transition = 'none';
                                inner.style.transform = 'scale(0.5)';
                                inner.style.opacity = '0';
                                setTimeout(() => {
                                    inner.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                                    inner.style.transform = 'scale(1)';
                                    inner.style.opacity = '1';
                                    bubble.classList.remove('popped');
                                }, 100);
                            }, 2000);
                        };
                        return bubble;
                    }

                    for (let i = 0; i < 25; i++) {
                        grid.appendChild(createBubble());
                    }
                </script>
</div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-gutter py-4 bg-surface-container-lowest/30 backdrop-blur-2xl border-t border-white/10 rounded-t-xl shadow-[0_-4px_24px_rgba(0,0,0,0.5)]">

<span class="text-label-bold font-label-bold">Home</span>
</a>
<!-- Active Burst Tab (Zen Mode) -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-8 py-2 shadow-[0_0_15px_rgba(0,251,251,0.4)] active:scale-95 duration-75" href="#">
<span class="material-symbols-outlined mb-0.5" data-icon="bubble_chart" style="font-variation-settings: 'FILL' 1;">bubble_chart</span>
<span class="text-label-bold font-label-bold">Burst</span>
</a>
</nav>
<!-- Interactive Layer: Particle System on Click -->
<div class="fixed inset-0 pointer-events-none z-20" id="particle-container"></div>
<script>
        // Micro-interaction for particle bursts
        document.addEventListener('click', (e) => {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                const size = Math.random() * 8 + 4;
                particle.className = 'fixed rounded-full bg-primary-fixed opacity-60';
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${e.clientX}px`;
                particle.style.top = `${e.clientY}px`;
                
                container.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 50;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;

                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 0.6 },
                    { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => particle.remove();
            }
        });
    </script>
</body></html>
