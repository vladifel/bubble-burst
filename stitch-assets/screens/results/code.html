<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(0, 251, 251, 0.1);
            border-right: 1px solid rgba(0, 251, 251, 0.1);
            box-shadow: inset 0 0 40px rgba(0, 251, 251, 0.05), 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .bubble-frame {
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.05) 40%, rgba(0, 251, 251, 0.1) 80%, rgba(0, 251, 251, 0.3) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: inset -10px -10px 20px rgba(0, 251, 251, 0.2), inset 10px 10px 20px rgba(255, 255, 255, 0.4), 0 10px 30px rgba(0, 251, 251, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .neon-text-primary {
            text-shadow: 0 0 10px rgba(0, 251, 251, 0.8), 0 0 20px rgba(0, 251, 251, 0.4);
        }

        .neon-text-secondary {
            text-shadow: 0 0 10px rgba(254, 0, 254, 0.8), 0 0 20px rgba(254, 0, 254, 0.4);
        }

        .neon-text-tertiary {
            text-shadow: 0 0 10px rgba(117, 255, 104, 0.8), 0 0 20px rgba(117, 255, 104, 0.4);
        }

        .glow-button-primary {
            background: linear-gradient(135deg, rgba(117, 255, 104, 0.2), rgba(117, 255, 104, 0.05));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(117, 255, 104, 0.4);
            border-right: 1px solid rgba(117, 255, 104, 0.2);
            box-shadow: inset 0 0 20px rgba(117, 255, 104, 0.2), 0 0 30px rgba(117, 255, 104, 0.3);
            transition: all 0.3s ease;
        }

        .glow-button-primary:hover {
            box-shadow: inset 0 0 30px rgba(117, 255, 104, 0.4), 0 0 50px rgba(117, 255, 104, 0.5);
            transform: translateY(-2px) scale(1.02);
        }

        .glow-button-secondary {
            background: rgba(0, 251, 251, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 251, 251, 0.5);
            box-shadow: inset 0 0 15px rgba(0, 251, 251, 0.1), 0 0 20px rgba(0, 251, 251, 0.1);
            transition: all 0.3s ease;
        }

        .glow-button-secondary:hover {
            box-shadow: inset 0 0 25px rgba(0, 251, 251, 0.2), 0 0 30px rgba(0, 251, 251, 0.3);
            transform: translateY(-2px) scale(1.02);
            background: rgba(0, 251, 251, 0.1);
        }

        .progress-bar-track {
            background: rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-bar-fill-cyan {
            background: linear-gradient(90deg, rgba(0, 251, 251, 0.5), rgba(0, 251, 251, 1));
            box-shadow: 0 0 15px rgba(0, 251, 251, 0.8), inset 0 2px 4px rgba(255, 255, 255, 0.4);
        }

        .progress-bar-fill-magenta {
            background: linear-gradient(90deg, rgba(254, 0, 254, 0.5), rgba(254, 0, 254, 1));
            box-shadow: 0 0 15px rgba(254, 0, 254, 0.8), inset 0 2px 4px rgba(255, 255, 255, 0.4);
        }

        .floating-bubble {
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>

<body class="bg-background text-on-surface min-h-screen relative overflow-hidden font-body-md">
<!-- Immersive Background -->

            LEVEL CLEARED
        </h1>
<!-- Central Score Card -->
<div class="glass-panel rounded-xl p-8 w-full max-w-md flex flex-col items-center relative floating-bubble">
<!-- Decorative corner highlights -->
<div class="absolute top-0 left-0 w-16 h-16 bg-gradient-to-br from-primary/20 to-transparent rounded-tl-xl pointer-events-none"></div>
<div class="absolute bottom-0 right-0 w-16 h-16 bg-gradient-to-tl from-primary-container/20 to-transparent rounded-br-xl pointer-events-none"></div>

<div class="bubble-frame w-40 h-40 rounded-full flex items-center justify-center mb-8 relative z-20">
<span class="font-display-lg text-[80px] font-extrabold text-tertiary-fixed neon-text-tertiary leading-none mt-2">S</span>

<div class="absolute top-2 right-4 w-4 h-4 rounded-full bubble-frame opacity-60"></div>
<div class="absolute bottom-4 left-6 w-6 h-6 rounded-full bubble-frame opacity-80"></div>
</div>
<!-- Score Number -->
<div class="text-center mb-8 w-full">
<p class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-widest mb-1">Total Score</p>
<p class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary neon-text-primary">1,450,290</p>
</div>
<!-- Stats Container -->

<!-- Stat: Total Popped -->

<div class="flex justify-between items-end">
<span class="font-label-bold text-label-bold text-on-surface-variant">Bubbles Popped</span>
<span class="font-headline-md text-headline-md text-primary">842</span>
</div>
<div class="h-3 w-full rounded-full progress-bar-track overflow-hidden">

</div>
</div>
<!-- Stat: Max Combo -->

</div>

</div>
</div>
<!-- Stat: Accuracy -->

<div class="flex justify-between items-end">
<span class="font-label-bold text-label-bold text-on-surface-variant">Accuracy</span>
<span class="font-headline-md text-headline-md text-primary">98.5%</span>
</div>
<div class="h-3 w-full rounded-full progress-bar-track overflow-hidden">
<div class="h-full rounded-full progress-bar-fill-cyan w-[98.5%]"></div>
</div>
</div>

</button>
